name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision numpy --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Robustness benchmark (PGD gate)
        run: |
          python -m adv_lab.eval.harness --n-samples 500 --output results/report.json
          cat results/report.json

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robustness-report
          path: results/report.json
