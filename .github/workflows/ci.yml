name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default. id-token is available for optional keyless
# (Sigstore) signing; see docs/SUPPLY_CHAIN.md.
permissions:
  contents: read

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      # Pin actions to a full commit SHA in production for strongest integrity.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          # Pinned lock file; switch to --require-hashes once the lock carries
          # hashes (see docs/SUPPLY_CHAIN.md).
          pip install -r requirements-lock.txt \
            --index-url https://download.pytorch.org/whl/cpu
          pip install --no-deps -e .

      - name: Run tests
        run: pytest -q

      - name: Robustness benchmark (PGD gate)
        run: |
          mkdir -p results
          python -m adv_lab.eval.harness --n-samples 500 --output results/report.json
          cat results/report.json

      - name: Sign benchmark report (HMAC)
        if: ${{ env.ADV_LAB_SIGNING_SECRET != '' }}
        env:
          ADV_LAB_SIGNING_SECRET: ${{ secrets.ADV_LAB_SIGNING_SECRET }}
          ADV_LAB_SIGNING_SALT: ${{ secrets.ADV_LAB_SIGNING_SALT }}
        run: |
          python - <<'PY'
          from adv_lab.eval.ci_signing import load_signing_key, sign_report
          key, _ = load_signing_key()
          with open("results/report.json") as f:
              signed = sign_report(f.read(), key)
          with open("results/report.signed.json", "w") as f:
              f.write(signed)
          print("Signed report written to results/report.signed.json")
          PY

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robustness-report
          path: results/
