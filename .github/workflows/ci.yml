name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check src tests

      - name: Run mypy
        run: mypy src tests

      - name: Run tests
        run: pytest -q

      - name: Generate ephemeral signing key
        run: python -c "import secrets; print(f'ADV_LAB_HMAC_KEY={secrets.token_hex(32)}')" >> "$GITHUB_ENV"

      - name: Robustness benchmark (PGD gate)
        run: |
          python -m adv_lab.eval.harness --n-samples 500 --output results/report.json --hmac-key-env ADV_LAB_HMAC_KEY
          python -c "import json; p=json.load(open('results/report.json')); assert p.get('signature_algorithm') == 'HMAC-SHA256'; assert len(p.get('signature', '')) == 64"
          cat results/report.json

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: robustness-report
          path: results/report.json
