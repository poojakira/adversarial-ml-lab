global:
  imageRegistry: ghcr.io/poojakira
  imagePullSecrets: []
  storageClass: standard
  ingressClass: nginx

api:
  enabled: true
  replicaCount: 3
  image:
    repository: adv-lab/api
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    host: adv-lab.example.com
    tls:
      enabled: true
      secretName: adv-lab-tls
  config:
    logLevel: info
    jsonLogs: true
    workers: 4
    timeout: 300

worker:
  enabled: true
  replicaCount: 2
  image:
    repository: adv-lab/worker
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
      nvidia.com/gpu: 1
    requests:
      cpu: 1000m
      memory: 2Gi
      nvidia.com/gpu: 1
  celery:
    concurrency: 4
    prefetchMultiplier: 4
    maxTasksPerChild: 1000

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    enabled: true
    size: 10Gi

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 15-alpine
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi
  persistence:
    enabled: true
    size: 20Gi
  auth:
    username: postgres
    password: ""
    database: adv_lab

queue:
  enabled: true
  image:
    repository: adv-lab/queue
    tag: latest
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

kms:
  enabled: true
  provider: aws
  aws:
    region: us-east-1
    keyId: ""
    roleArn: ""
  gcp:
    projectId: ""
    location: global
    keyRing: adv-lab-keyring
    keyName: adv-lab-signing-key
  vault:
    address: ""
    transitPath: transit
    keyName: adv-lab-signing

registry:
  enabled: true
  url: ghcr.io/poojakira/adv-lab
  username: ""
  password: ""
  cosignKey: ""
  cosignPassword: ""

monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
  grafana:
    enabled: true
    port: 3000
  otel:
    enabled: true
    endpoint: http://otel-collector:4317

security:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]

networkPolicy:
  enabled: true
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

rbac:
  enabled: true
  serviceAccount:
    create: true
    name: adv-lab
    annotations: {}

persistence:
  enabled: true
  storageClass: standard
  size: 50Gi

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: adv-lab
          topologyKey: kubernetes.io/hostname