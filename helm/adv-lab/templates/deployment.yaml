apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include \"adv-lab.fullname\" . }}-api
  labels:
    {{- include \"adv-lab.labels\" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount | default 2 }}
  selector:
    matchLabels:
      {{- include \"adv-lab.selectorLabels\" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include \"adv-lab.selectorLabels\" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: \"true\"
        prometheus.io/port: \"{{ .Values.monitoring.prometheus.port }}\"
        prometheus.io/path: \"/metrics\"
    spec:
      {{- with .Values.security.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include \"adv-lab.serviceAccountName\" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: \"{{ .Values.image.repository }}:{{ .Values.image.tag }}\"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.monitoring.prometheus.port }}
              protocol: TCP
          env:
            - name: ADV_LAB_ENVIRONMENT
              value: {{ .Values.environment }}
            - name: ADV_LAB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include \"adv-lab.fullname\" . }}-database
                  key: url
            - name: ADV_LAB_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include \"adv-lab.fullname\" . }}-redis
                  key: url
            - name: ADV_LAB_KMS_PROVIDER
              value: {{ .Values.kms.provider }}
            - name: ADV_LAB_KMS_AWS_REGION
              value: {{ .Values.kms.aws.region }}
            - name: ADV_LAB_KMS_AWS_KEY_ID
              value: {{ .Values.kms.aws.keyId }}
            - name: ADV_LAB_KMS_GCP_PROJECT_ID
              value: {{ .Values.kms.gcp.projectId }}
            - name: ADV_LAB_KMS_VAULT_ADDRESS
              value: {{ .Values.kms.vault.address }}
            - name: ADV_LAB_REGISTRY_URL
              value: {{ .Values.registry.url }}
            - name: ADV_LAB_LOG_LEVEL
              value: {{ .Values.api.logLevel }}
            - name: ADV_LAB_API_HOST
              value: {{ .Values.api.host }}
            - name: ADV_LAB_API_PORT
              value: \"{{ .Values.api.port }}\"
          {{- with .Values.api.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- with .Values.security.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include \"adv-lab.fullname\" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}